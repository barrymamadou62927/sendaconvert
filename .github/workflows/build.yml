name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Create and build
        run: |
          flutter create --no-pub tempapp
          cp -r lib tempapp/
          cp pubspec.yaml tempapp/
          cd tempapp
          flutter pub get
          flutter build apk --release --no-shrink
      - uses: actions/upload-artifact@v4
        with:
          name: sendaconvert-apk
          path: tempapp/build/app/outputs/flutter-apk/app-release.apk
